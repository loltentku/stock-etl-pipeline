version: 2

sources:
  - name: raw
    schema: public
    tables:
      - name: raw_stock_prices
        description: "Raw stock price data extracted via yfinance"
        columns:
          - name: ticker
            tests:
              - not_null
          - name: date
            tests:
              - not_null
          - name: close
            tests:
              - not_null